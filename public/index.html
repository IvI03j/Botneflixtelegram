<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
  >
  <title>Netflix Telegram</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
  <div class="page">
    <header class="topbar">
      <div class="logo">NETFLIX</div>
      <div class="topbar-right">Telegram Edition</div>
    </header>

    <section id="heroSection" class="hero dynamic-hero">
      <div class="hero-overlay"></div>

      <div class="hero-content">
        <p class="hero-label">DESTACADO</p>
        <h1 id="heroTitle">Cargando...</h1>
        <div id="heroMeta" class="hero-meta"></div>
        <div id="heroGenres" class="hero-tags"></div>
        <p id="heroDescription" class="hero-description"></p>

        <div class="hero-buttons">
          <button id="heroWatchBtn" class="hero-btn primary">▶ Ver ahora</button>
          <button id="heroInfoBtn" class="hero-btn secondary">Más información</button>
        </div>
      </div>
    </section>

    <section class="filters-section">
      <div class="filters-card">
        <input type="text" id="searchInput" placeholder="Buscar por título..." />

        <select id="genreFilter">
          <option value="">Todos los géneros</option>
        </select>

        <select id="yearFilter">
          <option value="">Todos los años</option>
        </select>

        <select id="typeFilter">
          <option value="">Todos los tipos</option>
          <option value="pelicula">Películas</option>
          <option value="serie">Series</option>
        </select>

        <button id="clearFilters">Limpiar</button>
      </div>
    </section>

    <main class="content">
      <div class="section-header">
        <h2>Catálogo</h2>
        <span id="resultsCount"></span>
      </div>

      <div id="movies" class="movies-grid">
        <p class="loading">Cargando contenido...</p>
      </div>
    </main>
  </div>

  <div id="detailModal" class="modal hidden">
    <div class="modal-card">
      <button id="backModalBtn" class="back-modal-btn">← Volver</button>
      <button id="closeModalBtn" class="close-modal">✕</button>

      <div class="modal-poster-wrap">
        <img id="modalPoster" src="" alt="">
        <div class="modal-hero-overlay"></div>
      </div>

      <div class="modal-content">
        <div class="modal-header-block">
          <h2 id="modalTitle">Título</h2>
          <div id="modalMeta" class="modal-meta"></div>
          <div id="modalGenres" class="modal-tags"></div>
        </div>

        <p id="modalDescription" class="modal-description"></p>

        <div class="modal-actions">
          <button id="modalWatchBtn" class="watch-btn">
            ▶ Ver ahora
          </button>

          <a id="modalTrailerBtn" class="trailer-btn hidden" href="#" target="_blank">
            ▶ Ver tráiler
          </a>
        </div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
