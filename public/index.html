<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
  >
  <title>Catálogo Telegram</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
  <div class="app">
    <header class="header">
      <div>
        <h1>NETFLIX</h1>
        <p class="subtitle">Tu catálogo en Telegram</p>
      </div>
    </header>

    <section class="filters">
      <input type="text" id="searchInput" placeholder="Buscar por título..." />

      <select id="genreFilter">
        <option value="">Todos los géneros</option>
      </select>

      <select id="yearFilter">
        <option value="">Todos los años</option>
      </select>

      <select id="typeFilter">
        <option value="">Todos los tipos</option>
        <option value="pelicula">Películas</option>
        <option value="serie">Series</option>
      </select>

      <button id="clearFilters">Limpiar</button>
    </section>

    <main>
      <div id="movies" class="movies-grid">
        <p class="loading">Cargando contenido...</p>
      </div>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
