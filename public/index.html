<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
  >
  <title>Netflix Telegram</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
  <div class="page">
    <header class="topbar">
      <div class="logo">NETFLIX</div>
      <div class="topbar-right">Telegram Edition</div>
    </header>

    <section class="hero">
      <div class="hero-overlay"></div>
      <div class="hero-content">
        <p class="hero-label">CATÁLOGO</p>
        <h1>Tu biblioteca en Telegram</h1>
        <p>
          Explora películas y series, filtra por género, año o tipo y abre el contenido directamente en Telegram.
        </p>
      </div>
    </section>

    <section class="filters-section">
      <div class="filters-card">
        <input type="text" id="searchInput" placeholder="Buscar por título..." />

        <select id="genreFilter">
          <option value="">Todos los géneros</option>
        </select>

        <select id="yearFilter">
          <option value="">Todos los años</option>
        </select>

        <select id="typeFilter">
          <option value="">Todos los tipos</option>
          <option value="pelicula">Películas</option>
          <option value="serie">Series</option>
        </select>

        <button id="clearFilters">Limpiar</button>
      </div>
    </section>

    <main class="content">
      <div class="section-header">
        <h2>Catálogo</h2>
        <span id="resultsCount"></span>
      </div>

      <div id="movies" class="movies-grid">
        <p class="loading">Cargando contenido...</p>
      </div>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
